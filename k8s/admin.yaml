apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: admin-service
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/streamingapp
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
spec:
  selector:
    app: admin-service
  ports:
  - port: 3003
    targetPort: 3003